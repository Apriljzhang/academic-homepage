name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Load Supabase env (from Actions variables)
        if: ${{ vars.SUPABASE != '' }}
        run: |
          # Allows storing multiple PUBLIC_* env vars in a single Actions variable named "SUPABASE"
          # with lines like: PUBLIC_SUPABASE_URL=... (one per line)
          printf '%s\n' "${{ vars.SUPABASE }}" >> "$GITHUB_ENV"
      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_SUPABASE_FUNCTIONS_BASE_URL: ${{ vars.PUBLIC_SUPABASE_FUNCTIONS_BASE_URL }}
          PUBLIC_SUPABASE_TRACK_VISIT_URL: ${{ vars.PUBLIC_SUPABASE_TRACK_VISIT_URL }}
          PUBLIC_SUPABASE_VISIT_COUNTS_URL: ${{ vars.PUBLIC_SUPABASE_VISIT_COUNTS_URL }}
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
